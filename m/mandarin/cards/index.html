<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandarin Flashcards</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="card-style.css">


    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#6200EA">

    <meta http-equiv="Content-Language" content="en">
    <meta name="Keywords" content="mandarin, chinese, learn mandarin, learn chinese, flashcards, learning cards, word cards, spaced repetition, communication board">
    <meta name="description" content="Mandarin Flashcards">
    <meta name="author" content="memalign">
    <meta property="og:title" content="Mandarin Flashcards" />
    <meta property="og:description" content="Learn Mandarin Chinese">
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://memalign.github.io/m/mandarin/cards/cards.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:url" content="https://memalign.github.io/m/mandarin/cards/index.html" />
    <meta name="twitter:title" content="Mandarin Flashcards">
    <meta name="twitter:description" content="Learn Mandarin Chinese">
    <meta name="twitter:image" content="https://memalign.github.io/m/mandarin/cards/cards.png">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="icon" type="image/png" sizes="32x32" href="https://memalign.github.io/favicon-32x32.png">

  </head>
  <body>
    <header class="cardsHeader">
      <h1>Mandarin Flashcards</h1>
      <button id="settings-btn">⚙️ </button>
    </header>

    <div class="app">
      <div class="frame"></div>
      <div id="buttons">
        <button id="again">Don't Know</button>
        <button id="good">Slow Recall</button>
        <button id="easy">Easy Recall</button>
      </div>
    </div>

    <div id="settings-panel" class="hidden">
      <h2>Settings</h2>
      <div class="left"><label><input type="checkbox" id="show-picture" checked> Show Picture</label></div>
      <div class="left"><label><input type="checkbox" id="show-pinyin" checked> Show Pinyin</label></div>
      <div class="left"><label><input type="checkbox" id="show-chinese" checked> Show Chinese</label></div>
      <div class="left"><label><input type="checkbox" id="show-english" checked> Show English</label></div>
      <div class="left"><label><input type="checkbox" id="show-speak" checked> Speak Button</label></div>
      <div class="left"><label><input type="checkbox" id="speak-on-reveal" checked> Speak on Reveal</label></div>
      <div class="center"><button id="save-settings">Close</button></div>
      <div class="stats">
        <div class="center" id="easyStats"></div>
        <div class="center" id="slowStats"></div>
        <div class="center" id="dontKnowStats"></div>
        <div class="center"><button id="reset-progress">Reset Progress</button></div>
      </div>
      <div class="stats">
        <div class="center" id="reviewCount">0 cards reviewed</div>
        <div class="center"><button id="reset-count">Reset Count</button></div>
      </div>
    </div>

    <script src="../data.js"></script>
    <script src="script.js"></script>
    <script src="pwa.js"></script>
  </body>
</html>
